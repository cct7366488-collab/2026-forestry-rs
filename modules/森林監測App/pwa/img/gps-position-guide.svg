<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif">
  <!-- ===== Defs: 共用元件 ===== -->
  <defs>
    <!-- 箭頭 -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#d97706"/>
    </marker>

    <!-- GPS pin 元件（用 <g> 而非 <symbol> 避免 use 沒指定 width/height 時 Chrome 渲染為全圖大小）-->
    <g id="gpsPin">
      <path d="M0,-2 C-7,-2 -10,-9 -10,-15 C-10,-22 -5,-26 0,-26 C5,-26 10,-22 10,-15 C10,-9 7,-2 0,-2 Z" fill="#dc2626" stroke="#7f1d1d" stroke-width="1"/>
      <circle cx="0" cy="-15" r="4" fill="#fef2f2"/>
    </g>

    <!-- 樹冠 simple -->
    <g id="tree">
      <ellipse cx="0" cy="-22" rx="13" ry="10" fill="#4a7c2c"/>
      <ellipse cx="-7" cy="-15" rx="9" ry="7" fill="#558b34"/>
      <ellipse cx="7" cy="-15" rx="9" ry="7" fill="#558b34"/>
      <rect x="-1.5" y="-7" width="3" height="7" fill="#6b4423"/>
    </g>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="1350" fill="#fafaf9"/>

  <!-- ===== Header ===== -->
  <rect x="0" y="0" width="900" height="70" fill="#14532d"/>
  <text x="450" y="32" font-size="22" font-weight="700" fill="white" text-anchor="middle">多邊形樣區 GPS 量測位置 — 野外操作指南</text>
  <text x="450" y="55" font-size="13" fill="#86efac" text-anchor="middle">ForestMRV v2.11.11　|　給林業測量人員　|　1 張看完該怎麼做</text>

  <!-- ===== 壹、30 秒概念 ===== -->
  <g transform="translate(0, 90)">
    <text x="40" y="20" font-size="17" font-weight="700" fill="#14532d">壹、30 秒搞懂：系統怎麼存多邊形？</text>

    <!-- 概念圖 -->
    <g transform="translate(60, 40)">
      <rect x="0" y="0" width="380" height="180" fill="white" stroke="#d6d3d1" stroke-width="1" rx="6"/>
      <!-- 多邊形 -->
      <polygon points="120,40 220,30 280,80 270,140 180,160 100,120" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <!-- 折點 -->
      <circle cx="120" cy="40" r="4" fill="#15803d"/>
      <circle cx="220" cy="30" r="4" fill="#15803d"/>
      <circle cx="280" cy="80" r="4" fill="#15803d"/>
      <circle cx="270" cy="140" r="4" fill="#15803d"/>
      <circle cx="180" cy="160" r="4" fill="#15803d"/>
      <circle cx="100" cy="120" r="4" fill="#15803d"/>
      <!-- GPS pin（重心附近）-->
      <use href="#gpsPin" x="190" y="100"/>
      <!-- 偏移箭頭（虛線）-->
      <line x1="190" y1="85" x2="120" y2="40" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="190" y1="85" x2="220" y2="30" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="190" y1="85" x2="280" y2="80" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="190" y1="85" x2="270" y2="140" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="190" y1="85" x2="180" y2="160" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="190" y1="85" x2="100" y2="120" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>

    <!-- 說明 -->
    <g transform="translate(470, 45)">
      <g transform="translate(0,0)">
        <use href="#gpsPin" x="10" y="20"/>
        <text x="30" y="15" font-size="14" font-weight="600" fill="#dc2626">GPS 錨點</text>
        <text x="30" y="32" font-size="11" fill="#44403c">＝ TWD97 絕對座標</text>
        <text x="30" y="46" font-size="11" fill="#44403c">（系統存「locationTWD97」）</text>
      </g>
      <g transform="translate(0,60)">
        <circle cx="13" cy="20" r="5" fill="#15803d"/>
        <text x="30" y="15" font-size="14" font-weight="600" fill="#15803d">多邊形折點</text>
        <text x="30" y="32" font-size="11" fill="#44403c">＝ 相對 GPS 的「偏移 (m)」</text>
        <text x="30" y="46" font-size="11" fill="#44403c">（系統存「local x, y」）</text>
      </g>
      <g transform="translate(0,120)">
        <text x="0" y="15" font-size="13" font-weight="700" fill="#14532d">→ 多邊形實際位置</text>
        <text x="0" y="34" font-size="12" fill="#44403c">＝ GPS 錨點 + 折點偏移</text>
        <text x="0" y="50" font-size="11" fill="#78716c">（兩者缺一不可）</text>
      </g>
    </g>
  </g>

  <!-- ===== 貳、關鍵原理 ===== -->
  <g transform="translate(0, 320)">
    <text x="40" y="20" font-size="17" font-weight="700" fill="#14532d">貳、關鍵原理：哪些東西「會變」、哪些「不變」？</text>

    <!-- 左：內部幾何 -->
    <g transform="translate(60, 40)">
      <rect x="0" y="0" width="370" height="230" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="6"/>
      <text x="185" y="22" font-size="14" font-weight="700" fill="#065f46" text-anchor="middle">✅ 內部幾何「不變」</text>
      <text x="185" y="40" font-size="11" fill="#047857" text-anchor="middle">形狀 / 面積 / 周長 — 與 GPS 量在哪「無關」</text>

      <!-- 兩個一樣的多邊形（不同 GPS 位置，但形狀同）-->
      <g transform="translate(40, 55)">
        <polygon points="20,20 60,15 80,40 70,75 30,80 10,55" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
        <use href="#gpsPin" x="25" y="40"/>
        <text x="50" y="105" font-size="10" fill="#44403c" text-anchor="middle">GPS 量在角落</text>
        <text x="50" y="120" font-size="11" font-weight="600" fill="#065f46" text-anchor="middle">面積 = 1500 m²</text>
      </g>
      <text x="200" y="110" font-size="22" fill="#059669" text-anchor="middle">≡</text>
      <g transform="translate(220, 55)">
        <polygon points="20,20 60,15 80,40 70,75 30,80 10,55" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
        <use href="#gpsPin" x="50" y="60"/>
        <text x="50" y="105" font-size="10" fill="#44403c" text-anchor="middle">GPS 量在重心</text>
        <text x="50" y="120" font-size="11" font-weight="600" fill="#065f46" text-anchor="middle">面積 = 1500 m²</text>
      </g>
      <text x="185" y="210" font-size="11" font-style="italic" fill="#047857" text-anchor="middle">→ 多邊形怎麼算面積、跟 GPS 量在哪沒關係</text>
    </g>

    <!-- 右：絕對位置 -->
    <g transform="translate(470, 40)">
      <rect x="0" y="0" width="370" height="230" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="6"/>
      <text x="185" y="22" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">⚠️ 絕對位置「會跟著漂」</text>
      <text x="185" y="40" font-size="11" fill="#b45309" text-anchor="middle">多邊形落在地圖哪裡 — 跟 GPS 那次的誤差「同步」</text>

      <!-- GPS 誤差示意 -->
      <g transform="translate(20, 55)">
        <!-- 真實位置 -->
        <polygon points="100,30 140,25 160,50 150,85 110,90 90,65" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="3,3"/>
        <text x="125" y="20" font-size="9" fill="#16a34a" text-anchor="middle">真實位置</text>
        <!-- 誤量位置 -->
        <polygon points="170,55 210,50 230,75 220,110 180,115 160,90" fill="#fef9c3" stroke="#d97706" stroke-width="2"/>
        <text x="195" y="135" font-size="9" fill="#92400e" text-anchor="middle">記錄到的位置</text>
        <use href="#gpsPin" x="195" y="80"/>
        <!-- 漂移箭頭 -->
        <line x1="125" y1="55" x2="195" y2="80" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrowRed)"/>
        <text x="160" y="70" font-size="10" font-weight="600" fill="#dc2626" transform="rotate(20 160 70)">漂移 ~10m</text>
      </g>
      <text x="185" y="210" font-size="10.5" fill="#92400e" text-anchor="middle">手機 GPS 林冠下 ±5–15 m　|　RTK ±0.05 m</text>
    </g>
  </g>

  <!-- ===== 參、4 種情境 ===== -->
  <g transform="translate(0, 590)">
    <text x="40" y="20" font-size="17" font-weight="700" fill="#14532d">參、依 GeoJSON 來源：你應該量在哪？</text>

    <!-- A. RTK / GIS -->
    <g transform="translate(40, 40)">
      <rect x="0" y="0" width="400" height="170" fill="white" stroke="#0369a1" stroke-width="1.5" rx="6"/>
      <rect x="0" y="0" width="400" height="28" fill="#dbeafe" rx="6"/>
      <text x="12" y="19" font-size="13" font-weight="700" fill="#075985">A. RTK / GIS 數位化（高精度 GeoJSON）</text>

      <g transform="translate(20, 40)">
        <polygon points="50,30 130,20 170,60 160,110 70,120 30,80" fill="#dbeafe" stroke="#0369a1" stroke-width="2"/>
        <!-- 重心星號 -->
        <polygon points="98,68 102,76 110,76 104,82 106,90 98,85 90,90 92,82 86,76 94,76" fill="#f59e0b" stroke="#b45309" stroke-width="0.5"/>
        <use href="#gpsPin" x="100" y="72"/>
      </g>
      <g transform="translate(220, 40)">
        <text x="0" y="20" font-size="13" font-weight="700" fill="#075985">→ 量在「重心」</text>
        <text x="0" y="42" font-size="11" fill="#44403c">★ 多邊形重心位置</text>
        <text x="0" y="58" font-size="11" fill="#44403c">　（GeoJSON 上傳後預覽會顯示）</text>
        <text x="0" y="80" font-size="11" fill="#44403c">★ 復測時 reviewer 走到中心</text>
        <text x="0" y="96" font-size="11" fill="#44403c">　就能對到所有折點</text>
        <text x="0" y="118" font-size="10" fill="#078b56" font-weight="600">最大誤差距離最小</text>
      </g>
    </g>

    <!-- B. 手機 GPS 巡邊 -->
    <g transform="translate(460, 40)">
      <rect x="0" y="0" width="400" height="170" fill="white" stroke="#16a34a" stroke-width="1.5" rx="6"/>
      <rect x="0" y="0" width="400" height="28" fill="#dcfce7" rx="6"/>
      <text x="12" y="19" font-size="13" font-weight="700" fill="#15803d">B. 手機 GPS 巡邊得到的 GeoJSON</text>

      <g transform="translate(15, 40)">
        <!-- 林冠 -->
        <use href="#tree" x="55" y="55"/>
        <use href="#tree" x="80" y="58"/>
        <use href="#tree" x="105" y="55"/>
        <!-- 多邊形（在林冠下）-->
        <polygon points="40,68 120,65 140,95 100,120 50,115" fill="#dcfce7" stroke="#15803d" stroke-width="2" opacity="0.85"/>
        <!-- GPS 在開闊地（右上） -->
        <use href="#gpsPin" x="180" y="55"/>
        <text x="180" y="70" font-size="9" fill="#92400e" text-anchor="middle">開闊地</text>
        <!-- 連線 -->
        <line x1="180" y1="40" x2="100" y2="90" stroke="#16a34a" stroke-width="1" stroke-dasharray="2,2"/>
      </g>
      <g transform="translate(220, 40)">
        <text x="0" y="20" font-size="13" font-weight="700" fill="#15803d">→ 量在「訊號好的位置」</text>
        <text x="0" y="42" font-size="11" fill="#44403c">★ 林緣 / 道路 / 開闊地</text>
        <text x="0" y="58" font-size="11" fill="#44403c">　（避開冠層遮蔽）</text>
        <text x="0" y="80" font-size="11" fill="#44403c">★ 多邊形折點本來就有 GPS</text>
        <text x="0" y="96" font-size="11" fill="#44403c">　誤差，錨點選好處最重要</text>
        <text x="0" y="118" font-size="10" fill="#078b56" font-weight="600">整體絕對誤差最小</text>
      </g>
    </g>

    <!-- C. PSP -->
    <g transform="translate(40, 230)">
      <rect x="0" y="0" width="400" height="170" fill="white" stroke="#9333ea" stroke-width="1.5" rx="6"/>
      <rect x="0" y="0" width="400" height="28" fill="#f3e8ff" rx="6"/>
      <text x="12" y="19" font-size="13" font-weight="700" fill="#7e22ce">C. 永久樣區（PSP，跨年復測）</text>

      <g transform="translate(20, 40)">
        <polygon points="50,30 150,30 150,110 50,110" fill="#f3e8ff" stroke="#7e22ce" stroke-width="2"/>
        <!-- NW 樁標 -->
        <rect x="44" y="24" width="12" height="12" fill="#92400e" stroke="#451a03" stroke-width="1"/>
        <text x="50" y="33" font-size="8" fill="white" font-weight="700" text-anchor="middle">樁</text>
        <use href="#gpsPin" x="50" y="30"/>
        <text x="100" y="80" font-size="10" fill="#7e22ce" text-anchor="middle" font-weight="600">20×25 矩形</text>
        <text x="100" y="125" font-size="9" fill="#7e22ce" text-anchor="middle">↑ NW 角點</text>
      </g>
      <g transform="translate(220, 40)">
        <text x="0" y="20" font-size="13" font-weight="700" fill="#7e22ce">→ 量在「指定樁位」</text>
        <text x="0" y="42" font-size="11" fill="#44403c">★ 通常是 NW 角點（西北）</text>
        <text x="0" y="58" font-size="11" fill="#44403c">　（依方法學 SOP 決定）</text>
        <text x="0" y="80" font-size="11" fill="#44403c">★ 跨年復測能對齊同一樁</text>
        <text x="0" y="96" font-size="11" fill="#44403c">　樁就是樣區的「身份證」</text>
        <text x="0" y="118" font-size="10" fill="#078b56" font-weight="600">復測準度最高</text>
      </g>
    </g>

    <!-- D. 臨時/抽樣樣區 -->
    <g transform="translate(460, 230)">
      <rect x="0" y="0" width="400" height="170" fill="white" stroke="#0891b2" stroke-width="1.5" rx="6"/>
      <rect x="0" y="0" width="400" height="28" fill="#cffafe" rx="6"/>
      <text x="12" y="19" font-size="13" font-weight="700" fill="#0e7490">D. 臨時樣區 / 抽樣樣區</text>

      <g transform="translate(20, 40)">
        <polygon points="50,30 130,25 165,55 155,105 75,115 30,85" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
        <polygon points="95,68 99,76 107,76 101,82 103,90 95,85 87,90 89,82 83,76 91,76" fill="#f59e0b" stroke="#b45309" stroke-width="0.5"/>
        <use href="#gpsPin" x="97" y="72"/>
      </g>
      <g transform="translate(220, 40)">
        <text x="0" y="20" font-size="13" font-weight="700" fill="#0e7490">→ 預設「重心」即可</text>
        <text x="0" y="42" font-size="11" fill="#44403c">★ 跟情境 A 同邏輯</text>
        <text x="0" y="64" font-size="11" fill="#44403c">★ 沒有指定樁位的需求</text>
        <text x="0" y="86" font-size="11" fill="#44403c">★ 量到合理位置即可</text>
        <text x="0" y="118" font-size="10" fill="#078b56" font-weight="600">最簡單的選擇</text>
      </g>
    </g>
  </g>

  <!-- ===== 肆、量錯救援流程 ===== -->
  <g transform="translate(0, 1030)">
    <text x="40" y="20" font-size="17" font-weight="700" fill="#14532d">肆、量錯也救得回來：v2.11.11 自動平移流程</text>

    <g transform="translate(40, 40)">
      <rect x="0" y="0" width="820" height="240" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="6" opacity="0.4"/>

      <!-- Step 1 -->
      <g transform="translate(20, 20)">
        <circle cx="20" cy="20" r="18" fill="#dc2626"/>
        <text x="20" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
        <text x="50" y="18" font-size="13" font-weight="700" fill="#7f1d1d">不小心量在錯位置</text>
        <text x="50" y="34" font-size="11" fill="#44403c">例：本來該量在重心，卻量到林外馬路</text>
        <!-- 小圖：polygon 在 A，GPS 在 B（遠處）-->
        <polygon points="40,55 90,55 90,85 40,85" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
        <use href="#gpsPin" x="180" y="80"/>
        <line x1="65" y1="70" x2="180" y2="65" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowRed)"/>
        <text x="125" y="62" font-size="9" fill="#dc2626" text-anchor="middle">距離很遠</text>
      </g>

      <!-- 箭頭 → -->
      <text x="240" y="115" font-size="28" fill="#475569" font-weight="700">→</text>

      <!-- Step 2 -->
      <g transform="translate(265, 20)">
        <circle cx="20" cy="20" r="18" fill="#d97706"/>
        <text x="20" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
        <text x="50" y="18" font-size="13" font-weight="700" fill="#92400e">上傳 GeoJSON</text>
        <text x="50" y="34" font-size="11" fill="#44403c">系統警告：「重心離 GPS 中心 X m」</text>
        <!-- 模擬警告框 -->
        <rect x="20" y="50" width="190" height="50" fill="#fef9c3" stroke="#d97706" stroke-width="1" rx="4"/>
        <text x="115" y="68" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">⚠️ 多邊形重心離 GPS</text>
        <text x="115" y="82" font-size="10" font-weight="700" fill="#92400e" text-anchor="middle">中心 1200 m</text>
        <text x="115" y="95" font-size="9" fill="#b45309" text-anchor="middle">請確認 GPS 是否設在樣區附近</text>
      </g>

      <!-- 箭頭 → -->
      <text x="495" y="115" font-size="28" fill="#475569" font-weight="700">→</text>

      <!-- Step 3 -->
      <g transform="translate(520, 20)">
        <circle cx="20" cy="20" r="18" fill="#0891b2"/>
        <text x="20" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">3</text>
        <text x="50" y="18" font-size="13" font-weight="700" fill="#155e75">按「重新定位」</text>
        <text x="50" y="34" font-size="11" fill="#44403c">走到正確位置（重心 / NW 樁）再按 GPS</text>
        <!-- GPS button mock -->
        <rect x="40" y="55" width="120" height="32" fill="#15803d" rx="4"/>
        <text x="100" y="76" font-size="13" font-weight="700" fill="white" text-anchor="middle">📍 重新定位</text>
        <!-- click highlight -->
        <circle cx="50" cy="71" r="14" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8"/>
        <circle cx="50" cy="71" r="20" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
      </g>

      <!-- 箭頭往下 -->
      <text x="700" y="160" font-size="28" fill="#475569" font-weight="700">↓</text>

      <!-- Step 4 -->
      <g transform="translate(20, 145)">
        <circle cx="20" cy="20" r="18" fill="#059669"/>
        <text x="20" y="25" font-size="14" font-weight="700" fill="white" text-anchor="middle">4</text>
        <text x="50" y="18" font-size="13" font-weight="700" fill="#065f46">系統自動平移多邊形 ✨</text>
        <text x="50" y="34" font-size="11" fill="#44403c">多邊形 local 偏移自動重算 — 絕對地理位置不變</text>
        <!-- 成功提示 mock -->
        <rect x="50" y="48" width="280" height="28" fill="#dcfce7" stroke="#059669" stroke-width="1" rx="4"/>
        <text x="190" y="66" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">
          ✅ GPS 中心移動 1180 m → 已自動平移多邊形
        </text>
      </g>

      <!-- 箭頭 → -->
      <text x="350" y="195" font-size="28" fill="#059669" font-weight="700">→</text>

      <!-- 最終結果 -->
      <g transform="translate(380, 145)">
        <text x="0" y="18" font-size="13" font-weight="700" fill="#065f46">結果：多邊形落在原本的真實位置</text>
        <polygon points="80,40 130,40 130,75 80,75" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
        <use href="#gpsPin" x="105" y="65"/>
        <text x="180" y="62" font-size="11" font-weight="600" fill="#15803d">↑ GPS + 多邊形重合</text>
        <text x="180" y="78" font-size="10" fill="#44403c">儲存後地圖上位置正確</text>
